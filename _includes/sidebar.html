<!-- Target for toggling the sidebar `.sidebar-checkbox` is for regular
     styles, `#sidebar-checkbox` for behavior. -->
<input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox">

<!-- Toggleable sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-item">
    <p>{{ site.description }}</p>
  </div>

  <nav class="sidebar-nav">
    <a class="sidebar-nav-item{% if page.title == '首頁' %} active{% endif %}" href="/">首頁</a>

    <a class="sidebar-nav-item{% if page.title == '標籤：jekyll' %} active{% endif %}" href="/tag/jekyll">•Jekyll</a>
    <a class="sidebar-nav-item{% if page.title == '標籤：markdown' %} active{% endif %}" href="/tag/markdown">•Markdown</a>
    <a class="sidebar-nav-item{% if page.title == '標籤：python' %} active{% endif %}" href="/tag/python">•Python</a>

    <a class="sidebar-nav-item" href="https://github.com/JHTNT/jhtnt.github.io">GitHub</a>
  </nav>

  <div class="sidebar-item">
    <p>
      &copy; {{ site.time | date: '%Y' }}.
    </p>
  </div>
</div>
